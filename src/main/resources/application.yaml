spring:
    application:
        name: Auto Casting

    datasource:
        url: ${DATABASE_URL}
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}
        hikari:
            connection-timeout: 20000
            maximum-pool-size: 5
            minimum-idle: 1

    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                default_schema: public

    flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
        default-schema: public
        schemas: public

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        redirect-uri: ${GOOGLE_REDIRECT_URL}/login/oauth2/code/google
                provider:
                    google:
                        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
                        user-name-attribute: email

    mail:
        host: smtp.gmail.com
        port: 587
        username: ${GOOGLE_MAIL_USER}
        password: ${GOOGLE_MAIL_PASS}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

app:
    frontend-url: ${FRONTEND_URL}
    backend-url: ${BACKEND_URL}
    oauth-success-url: ${FRONTEND_URL}/oauth2/success
    supabase:
        url: ${SUPABASE_URL:}
        service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
        legal-bucket: ${SUPABASE_LEGAL_BUCKET:legal-documents-private}
        legal-prefix: ${SUPABASE_LEGAL_PREFIX:legal/documents}
        legal-pdf-signed-url-ttl-seconds: ${SUPABASE_LEGAL_PDF_TTL_SECONDS:900}
    jobs:
        close-expired-castings:
            enabled: true
            cron: ${AUTO_CLOSE_CASTINGS_CRON:0 0 0 * * *}
            zone: ${AUTO_CLOSE_CASTINGS_ZONE:UTC}

server:
    port: ${PORT:8080}
    tomcat:
        threads:
            max: 20
            min-spare: 5

logging:
    level:
        root: INFO
        org:
            springframework:
                web: INFO
                security: INFO
