<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="x-apple-disable-message-reformatting">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="#{mail.reset.title}"></title>
    <style>
        /* Mobile-first */
        .wrap {
            width: 800px;
            max-width: 100%;
            background: #eef0f4;
            border-radius: 12px;
        }

        .card {
            width: 504px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .08);
        }

        .btn {
            display: inline-block;
            background: #6f2df3;
            text-decoration: none;
            font: 700 16px/56px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 0 32px;
            border-radius: 999px;
            min-width: 260px;
            text-align: center;
            max-width: 100%;
        }

        /* Forzar texto blanco del botón en la mayoría de clientes */
        .btn, a.btn, a.btn:link, a.btn:visited, a.btn span {
            color: #ffffff !important;
        }

        .muted {
            color: #9ca3af;
        }

        .text {
            font: 400 14px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #111827;
        }

        .h1 {
            margin: 0;
            font: 800 24px/1.25 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #0b0b0b;
        }

        .brand {
            font: 500 14px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #0b0b0b;
            letter-spacing: .2px;
        }

        @media (max-width: 600px) {
            .wrap {
                border-radius: 16px !important;
            }

            .card {
                border-radius: 20px !important;
            }

            .btn {
                display: block !important;
                width: 100% !important;
                max-width: 100% !important;
                min-width: 0 !important;
                box-sizing: border-box !important;
                padding: 0 16px !important;
            }
        }
    </style>
</head>
<body style="margin:0;padding:0;background:#eef0f4;">
<table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
    <tr>
        <td align="center" style="padding:24px 16px;">
            <!-- Lienzo con máx 800 -->
            <table border="0" cellpadding="0" cellspacing="0" class="wrap" role="presentation">

                <!-- Card (504px) -->
                <tr>
                    <td align="center" style="padding:20px 16px 16px 16px;">
                        <table align="center" border="0" cellpadding="0" cellspacing="0" class="card"
                               role="presentation">

                            <!-- Header: logo + brand -->
                            <tr>
                                <td align="center" style="padding:28px 16px 8px 16px;">
                                    <!-- Logo PNG inline (cid) -->
                                    <img alt="" height="41" src="cid:autocasting-logo"
                                         style="display:block;border:0;outline:0;text-decoration:none;margin:0 auto 8px auto;max-width:100%;height:auto;"
                                         width="41">
                                    <div class="brand" th:text="#{mail.brand.name}"></div>
                                </td>
                            </tr>

                            <tr>
                                <td style="padding:10px 28px 10px 28px;">
                                    <h1 class="h1" th:text="#{mail.reset.title}"></h1>

                                    <p class="text" style="margin:12px 0 16px 0;" th:text="#{mail.reset.lead}"></p>

                                    <p class="text" style="margin:0 0 8px 0;" th:text="#{mail.reset.alt}"></p>

                                    <p class="muted"
                                       style="margin:0 0 18px 0; font:400 14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; word-break:break-all;">
                                        <a style="color:#9ca3af;text-decoration:none;word-break:break-all;"
                                           th:href="${resetUrl}"
                                           th:text="${resetUrl}"></a>
                                    </p>

                                    <p class="text"
                                       style="margin:0 0 16px 0; border-top:1px solid #eee; padding-top:16px;"
                                       th:text="#{mail.reset.ignore}"></p>

                                    <!-- Botón -->
                                    <table border="0" cellpadding="0" cellspacing="0" role="presentation"
                                           style="margin:0 0 16px 0;"
                                           width="100%">
                                        <tr>
                                            <td align="center" style="padding:8px 0 20px 0;">
                                                <a class="btn" style="color:#ffffff !important;" th:href="${resetUrl}">
                                                    <span th:text="#{mail.reset.button}"></span>
                                                </a>
                                            </td>
                                        </tr>
                                    </table>

                                    <p style="margin:0 0 8px 0; font:400 12px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#6b7280;"
                                       th:text="#{mail.reset.expires(${minutes})}"></p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center" style="padding:20px 16px 28px 16px;">
                        <p style="margin:0 0 6px 0; font:400 13px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#6b7280;">
                            <strong th:text="#{mail.footer.support}"></strong>:
                            <a style="color:#374151;text-decoration:none;" th:href="'mailto:' + ${supportEmail}"
                               th:text="${supportEmail}"></a>
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
